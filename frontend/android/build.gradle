// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath 'com.google.gms:google-services:4.4.1'
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
  
  // Pin SDK and Build Tools versions to SDK 35 (Stable)
  project.ext {
      compileSdkVersion = 35
      targetSdkVersion = 35
      buildToolsVersion = "35.0.0"
  }

  configurations.all {
    resolutionStrategy {
      // Force stable androidx activity version to prevent BadParcelableException and NoSuchMethodError
      force "androidx.activity:activity:1.9.0"
      force "androidx.activity:activity-ktx:1.9.0"
      // Force compatible androidx.core version for SDK 35
      force "androidx.core:core:1.15.0"
      force "androidx.core:core-ktx:1.15.0"
      // Force compatible androidx.browser version for SDK 35
      force "androidx.browser:browser:1.8.0"
    }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
